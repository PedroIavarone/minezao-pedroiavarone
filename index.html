<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  iframe { width: 100vw; height: 100vh; border: none; display: block; }
</style>
</head>
<body>
<iframe id="game" src="EaglercraftX_1.8_u53_Offline_Signed.html" allowfullscreen></iframe>
<script>
const DEAD = 0.2;
const pressed = {};

function fireKey(doc, code, down) {
  if (pressed[code] === down) return;
  pressed[code] = down;
  const type = down ? 'keydown' : 'keyup';
  [doc, doc.activeElement].forEach(el => {
    el?.dispatchEvent(new KeyboardEvent(type, { code, bubbles: true }));
  });
}

setInterval(() => {
  const gp = navigator.getGamepads?.()[0];
  if (!gp) return;
  const doc = document.getElementById('game').contentDocument || document;

  const btnMap = {
    0: 'Space', 1: 'ShiftLeft', 2: 'KeyQ',
    3: 'KeyE', 4: 'KeyF', 5: 'KeyF', 9: 'Escape'
  };

  for (const [i, code] of Object.entries(btnMap)) {
    fireKey(doc, code, gp.buttons[i]?.pressed);
  }

  const lx = gp.axes[0], ly = gp.axes[1];
  fireKey(doc, 'KeyW', ly < -DEAD);
  fireKey(doc, 'KeyS', ly >  DEAD);
  fireKey(doc, 'KeyA', lx < -DEAD);
  fireKey(doc, 'KeyD', lx >  DEAD);
}, 50);
</script>
</body>
</html>
