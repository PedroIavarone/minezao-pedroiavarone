<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  iframe { width: 100vw; height: 100vh; border: none; display: block; }
</style>
</head>
<body>
<iframe id="game" src="EaglercraftX_1.8_u53_Offline_Signed.html" allowfullscreen></iframe>
<script>
document.getElementById('game').addEventListener('load', () => {
  const fdoc = document.getElementById('game').contentDocument;
  const fwin = document.getElementById('game').contentWindow;

  const script = fdoc.createElement('script');
  script.textContent = `
    const DEAD = 0.25;
    const pressed = {};

    function getCanvas() {
      return document.querySelector('canvas');
    }

    function fireKey(code, down) {
      if (pressed[code] === down) return;
      pressed[code] = down;
      const type = down ? 'keydown' : 'keyup';
      const opts = { code, key: code, bubbles: true, cancelable: true };
      window.dispatchEvent(new KeyboardEvent(type, opts));
      document.dispatchEvent(new KeyboardEvent(type, opts));
      const c = getCanvas();
      if (c) c.dispatchEvent(new KeyboardEvent(type, opts));
    }

    function fireMouse(button, down) {
      const key = 'mouse' + button;
      if (pressed[key] === down) return;
      pressed[key] = down;
      const type = down ? 'mousedown' : 'mouseup';
      const opts = { button, buttons: down ? (button === 0 ? 1 : 2) : 0, bubbles: true, cancelable: true };
      window.dispatchEvent(new MouseEvent(type, opts));
      document.dispatchEvent(new MouseEvent(type, opts));
      const c = getCanvas();
      if (c) c.dispatchEvent(new MouseEvent(type, opts));
    }

    function fireScroll(dy) {
      const opts = { deltaY: dy, bubbles: true, cancelable: true };
      window.dispatchEvent(new WheelEvent('wheel', opts));
      const c = getCanvas();
      if (c) c.dispatchEvent(new WheelEvent('wheel', opts));
    }

    let lastScroll = 0;

    setInterval(() => {
      const gp = navigator.getGamepads?.()[0];
      if (!gp) return;

      const btnMap = {
        0: 'Space',
        1: 'ShiftLeft',
        2: 'KeyQ',
        3: 'KeyE',
        9: 'Escape',
        8: 'KeyF',
      };
      for (const [i, code] of Object.entries(btnMap)) {
        fireKey(code, gp.buttons[i]?.pressed);
      }

      const lx = gp.axes[0], ly = gp.axes[1];
      fireKey('KeyW', ly < -DEAD);
      fireKey('KeyS', ly >  DEAD);
      fireKey('KeyA', lx < -DEAD);
      fireKey('KeyD', lx >  DEAD);

      fireMouse(0, gp.buttons[5]?.pressed); // RB = quebrar
      fireMouse(2, gp.buttons[4]?.pressed); // LB = colocar

      const now = Date.now();
      if (now - lastScroll > 200) {
        if (gp.buttons[12]?.pressed) { fireScroll(-100); lastScroll = now; }
        if (gp.buttons[13]?.pressed) { fireScroll(100);  lastScroll = now; }
      }
    }, 40);
  `;
  fdoc.body.appendChild(script);
});
</script>
</body>
</html>
